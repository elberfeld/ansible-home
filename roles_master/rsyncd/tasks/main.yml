---
- name: "Get secrets for {{servicename}}"
  ansible.builtin.include_tasks: ../functions/get_secret.yml
  with_items:
    - { path: "{{ basedir }}/rsyncbackup_user_pass", type: create, length: 12 }

- name: Install Packages for {{ servicename }}
  ansible.builtin.apt:
    state: present
    name:
      - rsync
      - logrotate

- name: create folder struct for {{ servicename }}
  ansible.builtin.file:
    path: "{{ item }}"
    state: "directory"
  with_items:
    - "{{ basedir }}"
    - "{{ datadir }}"
    - "/var/log/rsyncd/"

- name: Config files for {{ servicename }}
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/{{ item }}"
  with_items:
    - "rsyncd.conf"
    - "rsyncd.secrets"
    - "logrotate.d/rsyncd"
  register: config

- name: set rsyncd.secrets file permissions
  ansible.builtin.file:
    path: /etc/rsyncd.secrets
    owner: root
    group: root
    mode: "0400"

- name: Enable and start systemd service for {{ servicename }}
  ansible.builtin.systemd:
    name: rsync
    state: started
    enabled: true

- name: Restart systemd service for {{ servicename }}
  ansible.builtin.systemd:
    name: rsync
    state: restarted
  when: config.changed

