---
- name: "Install Packages for {{ servicename }}"
  ansible.builtin.apt:
    state: present
    name:
      - sane-utils

- name: "Config files for {{ servicename }}"
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/sane.d/{{ item }}"
  with_items:
    - saned.conf
  register: config

- name: "Add existing user saned to group scanner"
  ansible.builtin.user:
    name: "saned"
    groups: scanner
    append: true

# - name: "Unmask service for {{ servicename }}"
#   systemd:
#     name: saned
#     masked: no
#   register: unmask

# - name: "Reload Systemd {{ servicename }}"
#   systemd:
#     daemon_reload: yes
#   when: unmask.changed

- name: "Enable and start service for {{ servicename }}"
  ansible.builtin.systemd:
    name: saned.socket
    state: started
    enabled: true
    masked: false

- name: "Restart service for {{ servicename }}"
  ansible.builtin.systemd:
    name: saned.socket
    state: restarted
  when: config.changed
