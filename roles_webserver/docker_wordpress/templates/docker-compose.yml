

services:

  db:

    image: mariadb:11
    restart: always
    volumes:
      - "{{ basedir }}/db/:/var/lib/mysql"
    environment:
      MYSQL_ROOT_PASSWORD: "{{ mysql_admin_pass }}"
      MYSQL_PASSWORD: "{{ mysql_user_pass }}"
      MYSQL_DATABASE: "wordpress"
      MYSQL_USER: "wordpress"
    networks:
        - default
  
  app:

    image: wordpress:apache
    restart: always
    depends_on: 
      - db
    volumes:
      - "{{ basedir }}/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini"
      - "{{ basedir }}/data:/var/www/html"
    environment:
      WORDPRESS_DB_HOST: "db"
      WORDPRESS_DB_USER: "wordpress"
      WORDPRESS_DB_PASSWORD: "{{ mysql_user_pass }}"
    labels:
      - traefik.enable=true
      - traefik.http.routers.{{ servicename }}.rule=Host(`{{ domain }}`)
      - traefik.http.routers.{{ servicename }}.entrypoints=websecure
      - traefik.http.services.{{ servicename }}.loadbalancer.server.port=80      
      # domain2 redirect to domain
      - traefik.http.routers.{{ servicename }}_redirect.rule=Host(`{{ domain2 }}`)
      - traefik.http.routers.{{ servicename }}_redirect.entrypoints=websecure
      - traefik.http.routers.{{ servicename }}_redirect.tls.certresolver=letsencrypt
      - traefik.http.routers.{{ servicename }}_redirect.middlewares={{ servicename }}_redirect_to_www
      - traefik.http.middlewares.{{ servicename }}_redirect_to_www.redirectregex.regex=^https?://{{ domain2 }}/(.*)
      - traefik.http.middlewares.{{ servicename }}_redirect_to_www.redirectregex.replacement=https://{{ domain }}/$${1}
      - traefik.http.middlewares.{{ servicename }}_redirect_to_www.redirectregex.permanent=true
    networks:
      - default
      - web

networks:
  web:
    external: true
