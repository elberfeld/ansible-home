---
- name: "Get secrets for {{ servicename }}"
  ansible.builtin.include_tasks: ../functions/get_secret.yml
  with_items:
    - { path: "{{ basedir }}/grafana_secret_key", type: create, length: 32 }
    - { path: "{{ basedir }}/grafana_admin_pass", type: create, length: 12 }
    - { path: "{{ basedir }}/oauth_client_secret", type: create, length: 32 }


- name: "homeassistant_influxdb_token (slurp) @ intserver"
  delegate_to: intserver
  ansible.builtin.slurp:
    src: /srv/homeassistant/influxdb_token
  register: homeassistant_influxdb_token_secretfile

- name: "homeassistant_influxdb_token (decode)"
  ansible.builtin.set_fact:
    "homeassistant_influxdb_token": "{{ homeassistant_influxdb_token_secretfile.content | b64decode | regex_replace('\\s', '') }}"

- name: "create folder struct for {{ servicename }} 1"
  ansible.builtin.file:
    path: "{{ item }}"
    state: "directory"
  with_items:
    - "{{ basedir }}"

- name: "create folder struct for {{ servicename }} 2"
  ansible.builtin.file:
    path: "{{ item }}"
    state: "directory"
    owner: 472
    group: 0
  with_items:
    - "{{ basedir }}/data/"
    - "{{ basedir }}/provisioning/"
    - "{{ basedir }}/provisioning/datasources/"

- name: "create config files for {{ servicename }}"
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ basedir }}/{{ item }}"
  with_items:
    - docker-compose.yml
    - grafana.ini
    - provisioning/datasources/datasources.yml
  register: config_files

- name: "stop {{ servicename }} docker"
  community.docker.docker_compose_v2:
    project_src: "{{ basedir }}"
    state: absent
  when: config_files.changed

- name: "start {{ servicename }} docker"
  community.docker.docker_compose_v2:
    project_src: "{{ basedir }}"
    state: present
