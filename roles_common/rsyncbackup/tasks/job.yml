---
- name: create directory
  ansible.builtin.file:
    path: /srv/rsyncbackup/{{ job.key }}
    state: "directory"

- name: set file permissions
  ansible.builtin.file:
    path: /srv/rsyncbackup/{{ job.key }}/rsync_password
    owner: root
    group: root
    mode: "0600"
    state: touch

- name: rsyncbackup Scripte erstellen
  ansible.builtin.template:
    src: rsyncbackup-job.sh
    dest: /srv/rsyncbackup/{{ job.key }}/rsyncbackup-job.sh
    mode: u+x

- name: Cronjob für rsyncbackup Backup
  ansible.builtin.cron: name="rsyncbackup-{{ job.key }}" weekday="{{ job.value.weekday }}" hour="{{ job.value.hour }}" minute="{{ job.value.minute }}"
    job="/srv/rsyncbackup/{{ job.key }}/rsyncbackup-job.sh 2>&1 | ts '[\\%Y-\\%m-\\%d \\%H:\\%M:\\%S]' >> /var/log/rsyncbackup/{{ job.key }}.log"
